<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #212121;
            color: #fff;

        }

        #quiz {
            background-color: #111;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .question-container {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .question {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: lighter;
        }

        .options {
            list-style-type: none;
            padding: 0;
        }

        .option-label {
            margin-right: 50px;
            margin-bottom: 10px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <main>
            <h1>Quiz App</h1>
            <div id="quiz">
                
            </div>
            <button id="submit">Submit</button>
    </main>
</body>
<script src="script.js"></script>
</html>
